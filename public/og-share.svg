<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <style>
    .display { font-family: 'Fraunces', 'Times New Roman', serif; font-weight: 600; }
    .sans { font-family: 'Inter Tight', system-ui, sans-serif; font-weight: 600; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 500; }
  </style>

  <!-- Paper background -->
  <rect width="1200" height="630" fill="#f6efe2"/>

  <!-- Top-left logo + wordmark (larger) -->
  <g transform="translate(88 76)">
    <g transform="scale(1.4)">
      <g stroke="#1f1a14" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <line x1="32" y1="14" x2="32" y2="20" stroke-width="2.5"/>
        <circle cx="32" cy="12.5" r="2" fill="#1f1a14" stroke="none"/>
        <rect x="18" y="22" width="28" height="22" rx="5" stroke-width="2.75" fill="#f6efe2"/>
        <line x1="14" y1="32" x2="18" y2="32" stroke-width="2.5"/>
        <line x1="46" y1="32" x2="50" y2="32" stroke-width="2.5"/>
        <circle cx="26" cy="31" r="2.2" fill="#1f1a14" stroke="none"/>
        <circle cx="38" cy="31" r="2.2" fill="#1f1a14" stroke="none"/>
        <line x1="25" y1="38" x2="39" y2="38" stroke-width="2.5"/>
      </g>
      <circle cx="32" cy="32" r="26" stroke="#d65530" stroke-width="4.5" fill="none"/>
      <line x1="13.6" y1="50.4" x2="50.4" y2="13.6" stroke="#d65530" stroke-width="4.5" stroke-linecap="round"/>
    </g>
    <text x="112" y="64" class="sans" font-size="28" letter-spacing="9" fill="#6b6357" text-transform="uppercase">NO-SLOP.AI</text>
  </g>

  <!-- Headlines -->
  <text x="88" y="345" class="display" font-size="118" letter-spacing="-3" fill="#1f1a14">Own Your Output.</text>
  <text x="88" y="475" class="display" font-style="italic" font-size="118" letter-spacing="-3" fill="#d65530">Don&#8217;t Send Slop.</text>

  <!-- Bottom rule -->
  <line x1="88" y1="522" x2="1112" y2="522" stroke="#dccfb8" stroke-width="1"/>

  <!-- Footer line -->
  <g transform="translate(88 576)">
    <circle cx="6" cy="-6" r="5" fill="#d65530"/>
    <text x="22" y="0" class="mono" font-size="20" letter-spacing="4.4" fill="#6b6357">A POLITE PUBLIC SERVICE ANNOUNCEMENT</text>
  </g>
  <text x="1112" y="576" class="mono" font-size="28" letter-spacing="4" fill="#1f1a14" text-anchor="end">no-slop.ai</text>
</svg>
