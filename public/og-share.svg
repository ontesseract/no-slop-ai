<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  fill="none"
>
  <rect width="1200" height="630" fill="#f7f2ea" />
  <rect x="34" y="34" width="1132" height="562" rx="28" fill="#fcf8f2" stroke="#ddd2c4" stroke-width="2" />

  <!-- Logo top-left -->
  <g transform="translate(78 78)">
    <g stroke="#2d261f" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="48" y1="6" x2="48" y2="20" stroke-width="6" />
      <circle cx="48" cy="3" r="5" fill="#2d261f" stroke-width="0" />
      <rect x="20" y="24" width="56" height="46" rx="10" stroke-width="6" fill="#fcf8f2" />
      <line x1="10" y1="44" x2="20" y2="44" stroke-width="6" />
      <line x1="76" y1="44" x2="86" y2="44" stroke-width="6" />
      <circle cx="35" cy="42" r="5" fill="#2d261f" stroke-width="0" />
      <circle cx="61" cy="42" r="5" fill="#2d261f" stroke-width="0" />
      <line x1="32" y1="58" x2="64" y2="58" stroke-width="6" />
    </g>
    <circle cx="48" cy="48" r="44" stroke="#c55333" stroke-width="8" fill="none" />
    <line x1="17" y1="79" x2="79" y2="17" stroke="#c55333" stroke-linecap="round" stroke-width="8" />
  </g>

  <text
    x="200"
    y="118"
    fill="#5c5144"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="3.5"
  >
    NO-SLOP.AI
  </text>

  <!-- Two-line headline, stacked -->
  <text
    x="78"
    y="320"
    fill="#2d261f"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="124"
    font-weight="700"
    letter-spacing="-2"
  >
    Own Your Output.
  </text>

  <text
    x="78"
    y="460"
    fill="#c55333"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="124"
    font-style="italic"
    font-weight="700"
    letter-spacing="-2"
  >
    Don't Send Slop.
  </text>

  <!-- Bottom rule -->
  <line x1="78" y1="540" x2="1122" y2="540" stroke="#ddd2c4" stroke-width="2" />
  <text
    x="78"
    y="578"
    fill="#5c5144"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    letter-spacing="2"
  >
    A polite public service announcement.
  </text>
</svg>
