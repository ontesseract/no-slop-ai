<svg
  xmlns="http://www.w3.org/2000/svg"
  width="180"
  height="180"
  viewBox="0 0 180 180"
  fill="none"
>
  <rect width="180" height="180" rx="40" fill="#f7f2ea" />
  <g transform="translate(20 20)">
    <!-- Robot head -->
    <g stroke="#2d261f" stroke-linecap="round" stroke-linejoin="round" fill="none">
      <line x1="70" y1="10" x2="70" y2="26" stroke-width="7" />
      <circle cx="70" cy="6" r="6" fill="#2d261f" stroke-width="0" />
      <rect x="28" y="32" width="84" height="68" rx="14" stroke-width="7" fill="#f7f2ea" />
      <line x1="14" y1="62" x2="28" y2="62" stroke-width="7" />
      <line x1="112" y1="62" x2="126" y2="62" stroke-width="7" />
      <circle cx="50" cy="60" r="7" fill="#2d261f" stroke-width="0" />
      <circle cx="90" cy="60" r="7" fill="#2d261f" stroke-width="0" />
      <line x1="46" y1="84" x2="94" y2="84" stroke-width="7" />
    </g>
    <!-- Prohibition -->
    <circle cx="70" cy="70" r="62" stroke="#c55333" stroke-width="11" fill="none" />
    <line
      x1="26"
      y1="114"
      x2="114"
      y2="26"
      stroke="#c55333"
      stroke-linecap="round"
      stroke-width="11"
    />
  </g>
</svg>
