<svg
  xmlns="http://www.w3.org/2000/svg"
  width="64"
  height="64"
  viewBox="0 0 64 64"
  fill="none"
>
  <!-- Robot head (behind) -->
  <g stroke="#2d261f" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Antenna -->
    <line x1="32" y1="8" x2="32" y2="14" stroke-width="3" />
    <circle cx="32" cy="6" r="2.5" fill="#2d261f" stroke-width="0" />
    <!-- Head -->
    <rect x="14" y="16" width="36" height="30" rx="6" stroke-width="3" fill="#f7f2ea" />
    <!-- Ears -->
    <line x1="9" y1="29" x2="14" y2="29" stroke-width="3" />
    <line x1="50" y1="29" x2="55" y2="29" stroke-width="3" />
    <!-- Eyes -->
    <circle cx="24" cy="28" r="3" fill="#2d261f" stroke-width="0" />
    <circle cx="40" cy="28" r="3" fill="#2d261f" stroke-width="0" />
    <!-- Mouth -->
    <line x1="22" y1="38" x2="42" y2="38" stroke-width="3" />
  </g>
  <!-- Prohibition circle (in front) -->
  <circle cx="32" cy="32" r="26" stroke="#c55333" stroke-width="5" fill="none" />
  <line
    x1="14"
    y1="50"
    x2="50"
    y2="14"
    stroke="#c55333"
    stroke-linecap="round"
    stroke-width="5"
  />
</svg>
